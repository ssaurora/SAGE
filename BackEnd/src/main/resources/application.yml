server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sage}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: ${SAGE_MAX_UPLOAD_FILE_SIZE:64MB}
      max-request-size: ${SAGE_MAX_UPLOAD_REQUEST_SIZE:128MB}
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

sage:
  jwt:
    secret: ${JWT_SECRET:sage-week1-hs256-secret-key-change-me-12345}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  pass1:
    base-url: ${PASS1_BASE_URL:http://localhost:8001}
  job-sync:
    fixed-delay-ms: ${JOB_SYNC_FIXED_DELAY_MS:2000}
  upload:
    root: ${SAGE_UPLOAD_ROOT:BackEnd/runtime/uploads}
