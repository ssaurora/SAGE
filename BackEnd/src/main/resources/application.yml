server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sage}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

sage:
  jwt:
    secret: ${JWT_SECRET:sage-week1-hs256-secret-key-change-me-12345}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  pass1:
    base-url: ${PASS1_BASE_URL:http://localhost:8001}

