server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sage}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

sage:
  jwt:
    secret: ${JWT_SECRET:sage-week1-hs256-secret-key-change-me-12345}
    expiration-hours: ${JWT_EXPIRATION_HOURS:8}
  pass1:
    base-url: ${PASS1_BASE_URL:http://localhost:8001}
  job-sync:
    fixed-delay-ms: ${JOB_SYNC_FIXED_DELAY_MS:2000}
  upload:
    root: ${SAGE_UPLOAD_ROOT:BackEnd/runtime/uploads}
  repair-llm:
    enabled: ${SAGE_REPAIR_LLM_ENABLED:true}
    api-key: ${SAGE_REPAIR_LLM_API_KEY:}
    model: ${SAGE_REPAIR_LLM_MODEL:gpt-4o-mini}
    timeout-ms: ${SAGE_REPAIR_LLM_TIMEOUT_MS:3000}
